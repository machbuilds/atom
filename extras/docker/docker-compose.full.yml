# docker-compose.full.yml — everything containerized.
#
# Use this when you want the app inside Docker too (CI, Linux dev, full
# parity testing). On macOS dev, prefer `docker-compose.yml` (backing
# services only) and run the app natively for fast hot reload.
#
# Usage:
#   docker compose -f docker-compose.full.yml up -d
#   docker compose -f docker-compose.full.yml down
#   docker compose -f docker-compose.full.yml logs -f app
#
# Bind-mounts ./src for hot reload inside the container. macOS file-system
# overhead can make this 2-3x slower than native; you have been warned.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: ${COMPOSE_PROJECT_NAME:-app}-app
    restart: unless-stopped
    command: ["npm", "run", "dev"]
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-app}
      REDIS_URL: redis://redis:6379
      PORT: 3000
      HOSTNAME: 0.0.0.0
    env_file:
      - .env
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16.4-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-app}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    image: redis:7.4-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-app}-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  postgres_data:
  redis_data:
